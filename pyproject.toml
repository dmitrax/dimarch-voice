[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "dimarch-voice"
version = "0.1.0"
description = "Local voice toolkit for Arch Linux: transcription, dictation, meeting capture"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12",
    "rich>=13",
]

[project.scripts]
dvoice = "dimarch_voice.cli:app"
scribe = "dimarch_voice.scribe:app"

[project.urls]
Repository = "https://github.com/dmitrax/dimarch-voice"

[tool.setuptools.packages.find]
where = ["src"]
